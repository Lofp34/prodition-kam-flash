<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Flashcards</title><style>:root{--bg:#f5f7f8;--text:#102A33;--muted:#60717A;--brand:#145766;--soft:#e6f3f5;--line:rgba(16,42,51,.12);--shadow:0 18px 60px rgba(16,42,51,.12);--radius:28px}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Inter,Segoe UI,sans-serif;background:radial-gradient(circle at 10% 0%,rgba(29,127,145,.18),transparent 30%),radial-gradient(circle at 90% 10%,rgba(20,87,102,.14),transparent 35%),var(--bg);color:var(--text);min-height:100vh}.container{width:min(1120px,calc(100% - 24px));margin:0 auto 48px}.home{padding-top:14px}.home-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}.deck-card,.info-card{border:1px solid var(--line);background:rgba(255,255,255,.74);border-radius:28px;padding:24px;box-shadow:0 10px 35px rgba(16,42,51,.07);cursor:pointer}.deck-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}h2{margin:12px 0 8px;font-size:26px;letter-spacing:-.035em}.deck-card p,.info-card p{color:var(--muted);line-height:1.45;margin:0}.badge{display:inline-flex;padding:7px 12px;border-radius:999px;background:var(--soft);color:var(--brand);font-size:12px;font-weight:850;text-transform:uppercase;letter-spacing:.06em}.meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px}.pill,.stat{border:1px solid var(--line);background:rgba(255,255,255,.7);border-radius:999px;padding:8px 11px;color:var(--muted);font-size:13px;font-weight:750}.hidden{display:none!important}header{padding:24px 12px 12px;text-align:center}.eyebrow{display:inline-flex;padding:7px 12px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.72);color:var(--brand);font-size:13px;font-weight:850}h1{margin:14px auto 8px;max-width:900px;font-size:clamp(32px,5vw,56px);line-height:1.03;letter-spacing:-.05em}.subtitle{margin:0 auto;max-width:780px;color:var(--muted);font-size:17px;line-height:1.5}.toolbar{position:sticky;top:0;z-index:5;backdrop-filter:blur(18px);background:rgba(245,247,248,.88);padding:10px 0;display:grid;gap:10px}.controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}.filter-toggle{display:none}input,select,button{font:inherit}input,select{border:1px solid var(--line);background:rgba(255,255,255,.9);border-radius:14px;padding:10px 12px;min-height:42px}input{min-width:min(360px,100%)}button{border:0;border-radius:14px;padding:10px 14px;min-height:42px;cursor:pointer;background:var(--text);color:white;font-weight:850}button.secondary{background:rgba(255,255,255,.9);color:var(--text);border:1px solid var(--line)}button.good{background:var(--brand)}.stats{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:13px;font-weight:700}.stage{margin-top:14px;display:grid;place-items:center;gap:14px}.progress{width:min(780px,100%);height:8px;background:rgba(16,42,51,.08);border-radius:999px;overflow:hidden}.bar{height:100%;width:0;background:linear-gradient(90deg,var(--brand),#1d7f91)}.card-wrap{width:min(780px,100%);min-height:390px;perspective:1400px}.card{position:relative;width:100%;min-height:390px;border-radius:var(--radius);cursor:pointer;box-shadow:var(--shadow);transform-style:preserve-3d}.face{position:absolute;inset:0;border-radius:var(--radius);padding:clamp(26px,4vw,44px);display:flex;flex-direction:column;justify-content:space-between;overflow:hidden;transition:opacity .28s ease,transform .55s cubic-bezier(.2,.8,.2,1),visibility .28s ease;backface-visibility:hidden}.face:before{content:"";position:absolute;width:340px;height:340px;border-radius:50%;right:-145px;top:-150px;background:radial-gradient(circle,rgba(29,127,145,.18),transparent 64%)}.front{background:linear-gradient(145deg,rgba(255,255,255,.96),rgba(255,255,255,.78));border:1px solid rgba(255,255,255,.75);opacity:1;visibility:visible;transform:rotateY(0deg) translateZ(1px)}.back{background:linear-gradient(145deg,#123642,#165667);color:white;border:1px solid rgba(255,255,255,.16);opacity:0;visibility:hidden;transform:rotateY(-180deg) translateZ(1px)}.card.flipped .front{opacity:0;visibility:hidden;transform:rotateY(180deg) translateZ(1px)}.card.flipped .back{opacity:1;visibility:visible;transform:rotateY(0deg) translateZ(1px)}.category{width:fit-content;padding:7px 11px;border-radius:999px;background:var(--soft);color:var(--brand);font-weight:850;font-size:13px}.back .category{background:rgba(255,255,255,.12);color:white}.question{font-size:clamp(28px,4.5vw,44px);line-height:1.12;letter-spacing:-.035em;font-weight:850;max-width:680px;z-index:1}.answer{font-size:clamp(21px,3.1vw,34px);line-height:1.22;letter-spacing:-.025em;font-weight:780;max-width:700px;z-index:1}.hint{margin-top:22px;color:var(--muted);font-size:14px;font-weight:700;display:flex;justify-content:space-between}.back .hint{color:rgba(255,255,255,.72)}.nav{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}.grid{margin-top:30px;display:grid;grid-template-columns:repeat(auto-fit,minmax(245px,1fr));gap:14px}.mini{padding:18px;border-radius:22px;border:1px solid var(--line);background:rgba(255,255,255,.68);cursor:pointer}.mini .tag{color:var(--brand);font-weight:850;font-size:12px;text-transform:uppercase;margin-bottom:8px}.mini h3{margin:0;font-size:16px;line-height:1.25}.phrases{margin-top:28px;background:rgba(255,255,255,.68);border:1px solid var(--line);border-radius:var(--radius);padding:24px}.phrases h2{font-size:26px}.phrases li{margin:10px 0;font-weight:750;line-height:1.45}.empty{display:none;text-align:center;padding:40px;color:var(--muted)}@media(max-width:700px){#studyView header{display:none}.container{width:calc(100% - 18px);margin-bottom:18px}.home{padding-top:9px}.toolbar{position:static;padding:8px 0 10px}.controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}.filter-toggle{display:inline-flex;align-items:center;justify-content:center}.controls button,.controls input,.controls select{font-size:14px;min-height:38px;padding:8px 9px}.controls #homeBtn{grid-column:1}.controls #filterToggle{grid-column:2}.controls #shuffle{grid-column:3}.controls #mastered{grid-column:1/4}.controls #search,.controls #category,.controls #reset{grid-column:1/4}.controls:not(.filters-open) #search,.controls:not(.filters-open) #category,.controls:not(.filters-open) #reset{display:none}.stats .stat:nth-child(3){display:none}.stat{font-size:12px;padding:6px 9px}.stage{margin-top:8px;gap:10px}.progress{height:6px}.card-wrap,.card{min-height:min(610px,calc(100svh - 238px));width:100%}.face{padding:24px 22px}.question{font-size:clamp(26px,7vw,36px)}.answer{font-size:clamp(21px,6.1vw,32px)}.nav{position:sticky;bottom:0;z-index:4;background:linear-gradient(180deg,rgba(245,247,248,0),rgba(245,247,248,.95) 30%);padding:18px 0 6px}.nav button{flex:1;font-size:15px;min-height:40px;padding:9px 8px}.grid,.phrases{display:none}.home-grid{grid-template-columns:1fr}.deck-card,.info-card{padding:22px;border-radius:24px}}</style></head><body><section id="homeView"><main class="container home"><div class="home-grid" id="deckGrid"><article class="info-card"><span class="badge">Chargement</span><h2>Les cartes arrivent…</h2></article></div></main></section><section id="studyView" class="hidden"><header><div class="eyebrow" id="studyBadge">Flashcards</div><h1 id="studyTitle"></h1><p class="subtitle" id="studySubtitle"></p></header><main class="container"><section class="toolbar"><div class="controls" id="controls"><button class="secondary" id="homeBtn">← Accueil</button><button class="secondary filter-toggle" id="filterToggle">Filtres</button><button class="secondary" id="shuffle">Mélanger</button><button class="good" id="mastered">Je maîtrise</button><input id="search" type="search" placeholder="Rechercher une commande, une notion…"><select id="category"><option value="all">Toutes les catégories</option></select><button class="secondary" id="reset">Réinitialiser</button></div><div class="stats"><span class="stat" id="counter"></span><span class="stat" id="masteredCount"></span><span class="stat">Espace : retourner • ←/→ : naviguer</span></div></section><section class="stage"><div class="progress"><div class="bar" id="bar"></div></div><div class="card-wrap"><div class="card" id="card"><div class="face front"><div class="category" id="catFront"></div><div class="question" id="front"></div><div class="hint"><span>Cliquer pour voir la réponse</span><span id="idxFront"></span></div></div><div class="face back"><div class="category" id="catBack"></div><div class="answer" id="back"></div><div class="hint"><span>Cliquer pour revenir à la question</span><span id="idxBack"></span></div></div></div></div><div class="nav"><button class="secondary" id="prev">← Précédente</button><button class="secondary" id="flip">Retourner</button><button id="next">Suivante →</button></div><div class="empty" id="empty">Aucune carte ne correspond à ta recherche.</div></section><section class="phrases hidden" id="phrasesBox"><h2>À garder en tête</h2><ol id="phrasesList"></ol></section><section class="grid" id="grid"></section></main></section><script src="decks.js"></script><script>let FOLDERS=FC_DATA.folders,DECKS=FC_DATA.decks.map(d=>({...d,cards:d.cards.map(c=>({category:c[0],front:c[1],back:c[2]}))}));let currentFolder=null,deck=null,filtered=[],index=0,flipped=false,mastered=new Set();const el=id=>document.getElementById(id),card=el('card'),search=el('search'),category=el('category'),controls=el('controls');function key(){return'mastered:'+deck.id}function save(){localStorage.setItem(key(),JSON.stringify([...mastered]))}function load(){try{mastered=new Set(JSON.parse(localStorage.getItem(key())||'[]'))}catch{mastered=new Set()}}function cardId(c){return c.category+'|'+c.front}function childrenFolders(parent){return FOLDERS.filter(f=>(f.parent||null)===(parent||null))}function decksIn(folder){return DECKS.filter(d=>d.folder===folder)}function folderById(id){return FOLDERS.find(f=>f.id===id)}function showHome(){deck=null;currentFolder=null;location.hash='';el('homeView').classList.remove('hidden');el('studyView').classList.add('hidden');renderHome()}function renderHome(){let html='';if(currentFolder){const parent=folderById(currentFolder)?.parent||null;const label=parent?folderById(parent).label:'Familles';html+=`<article class="deck-card" onclick="${parent?`openFolder('${parent}')`:'showHome()'}"><span class="badge">Retour</span><h2>← ${label}</h2><p>Revenir au niveau précédent.</p></article>`}childrenFolders(currentFolder).forEach(f=>{html+=`<article class="deck-card" onclick="openFolder('${f.id}')"><span class="badge">Dossier</span><h2>${f.label}</h2><p>${f.desc}</p><div class="meta"><span class="pill">${childrenFolders(f.id).length} sous-dossiers</span><span class="pill">${decksIn(f.id).length} jeux</span></div></article>`});decksIn(currentFolder).forEach(d=>{html+=`<article class="deck-card" onclick="openDeck('${d.id}')"><span class="badge">${d.badge}</span><h2>${d.title}</h2><p>${d.description}</p><div class="meta"><span class="pill">${d.cards.length} cartes</span><span class="pill">${[...new Set(d.cards.map(c=>c.category))].length} catégories</span></div></article>`});el('deckGrid').innerHTML=html||'<article class="info-card"><span class="badge">Vide</span><h2>Aucun jeu ici</h2></article>'}window.openFolder=function(id){currentFolder=id;location.hash='folder='+id;el('homeView').classList.remove('hidden');el('studyView').classList.add('hidden');renderHome();scrollTo({top:0,behavior:'smooth'})};window.openDeck=function(id){deck=DECKS.find(d=>d.id===id);if(!deck)return;location.hash='deck='+id;load();filtered=[...deck.cards];index=0;search.value='';controls.classList.remove('filters-open');category.innerHTML='<option value="all">Toutes les catégories</option>';[...new Set(deck.cards.map(c=>c.category))].sort((a,b)=>a.localeCompare(b,'fr')).forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;category.appendChild(o)});el('studyBadge').textContent=deck.badge;el('studyTitle').textContent=deck.title;el('studySubtitle').textContent=deck.subtitle;el('homeView').classList.add('hidden');el('studyView').classList.remove('hidden');renderPhrases();render();scrollTo({top:0,behavior:'smooth'})};function renderPhrases(){const box=el('phrasesBox'),list=el('phrasesList');if(deck.phrases&&deck.phrases.length){box.classList.remove('hidden');list.innerHTML=deck.phrases.map(p=>`<li>${p}</li>`).join('')}else box.classList.add('hidden')}function render(){if(!filtered.length){el('empty').style.display='block';card.style.visibility='hidden';el('counter').textContent='0 carte';el('bar').style.width='0%';renderGrid();return}el('empty').style.display='none';card.style.visibility='visible';index=Math.max(0,Math.min(index,filtered.length-1));const c=filtered[index];el('catFront').textContent=c.category;el('catBack').textContent=c.category;el('front').textContent=c.front;el('back').textContent=c.back;el('idxFront').textContent=`${index+1} / ${filtered.length}`;el('idxBack').textContent=`${index+1} / ${filtered.length}`;el('counter').textContent=`Carte ${index+1} / ${filtered.length}`;el('masteredCount').textContent=`${mastered.size} maîtrisée${mastered.size>1?'s':''}`;el('bar').style.width=`${((index+1)/filtered.length)*100}%`;flipped=false;card.classList.remove('flipped');el('mastered').textContent=mastered.has(cardId(c))?'Maîtrisée ✓':'Je maîtrise';renderGrid()}function renderGrid(){const grid=el('grid');grid.innerHTML='';filtered.forEach((c,i)=>{const item=document.createElement('article');item.className='mini';item.innerHTML=`<div class="tag">${c.category}</div><h3>${i+1}. ${c.front}</h3>`;item.onclick=()=>{index=i;scrollTo({top:0,behavior:'smooth'});render()};grid.appendChild(item)})}function applyFilters(){const q=search.value.trim().toLowerCase(),cat=category.value;filtered=deck.cards.filter(c=>(cat==='all'||c.category===cat)&&(!q||(c.front+' '+c.back+' '+c.category).toLowerCase().includes(q)));index=0;render()}function next(){if(filtered.length){index=(index+1)%filtered.length;render()}}function prev(){if(filtered.length){index=(index-1+filtered.length)%filtered.length;render()}}function flip(){if(filtered.length){flipped=!flipped;card.classList.toggle('flipped',flipped)}}function shuffle(){for(let i=filtered.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[filtered[i],filtered[j]]=[filtered[j],filtered[i]]}index=0;render()}card.onclick=flip;el('flip').onclick=flip;el('next').onclick=next;el('prev').onclick=prev;el('shuffle').onclick=shuffle;el('homeBtn').onclick=showHome;el('filterToggle').onclick=()=>controls.classList.toggle('filters-open');el('reset').onclick=()=>{search.value='';category.value='all';filtered=[...deck.cards];index=0;mastered.clear();save();render()};el('mastered').onclick=()=>{if(!filtered.length)return;const id=cardId(filtered[index]);mastered.has(id)?mastered.delete(id):mastered.add(id);save();render()};search.oninput=applyFilters;category.onchange=applyFilters;document.addEventListener('keydown',e=>{if(['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName))return;if(!deck)return;if(e.key===' '){e.preventDefault();flip()}if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();if(e.key==='Escape')showHome()});function boot(){const d=location.hash.match(/deck=([^&]+)/);const f=location.hash.match(/folder=([^&]+)/);if(d){openDeck(decodeURIComponent(d[1]));return}if(f){openFolder(decodeURIComponent(f[1]));return}renderHome()}boot();</script></body></html>
