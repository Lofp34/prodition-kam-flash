<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Flashcards Laurent Serre</title>
<style>
:root{--bg:#f5f7f8;--text:#102A33;--muted:#60717A;--brand:#145766;--brand2:#1d7f91;--soft:#e6f3f5;--line:rgba(16,42,51,.12);--shadow:0 18px 60px rgba(16,42,51,.12);--radius:28px}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Inter,Segoe UI,sans-serif;background:radial-gradient(circle at 10% 0%,rgba(29,127,145,.18),transparent 30%),radial-gradient(circle at 90% 10%,rgba(20,87,102,.14),transparent 35%),var(--bg);color:var(--text);min-height:100vh}.container{width:min(1120px,calc(100% - 32px));margin:0 auto 48px}header{padding:34px 20px 20px;text-align:center}.eyebrow,.badge{display:inline-flex;padding:7px 12px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.72);color:var(--brand);font-size:13px;font-weight:850}.badge{background:var(--soft);text-transform:uppercase;letter-spacing:.06em;font-size:12px}h1{margin:18px auto 8px;max-width:920px;font-size:clamp(34px,5vw,62px);line-height:1.02;letter-spacing:-.05em}.subtitle{margin:0 auto;max-width:780px;color:var(--muted);font-size:18px;line-height:1.5}.home{padding:16px 0 0}.home-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-top:0}.deck-card,.info-card{border:1px solid var(--line);background:rgba(255,255,255,.72);border-radius:28px;padding:24px;box-shadow:0 10px 35px rgba(16,42,51,.07)}.deck-card{cursor:pointer;transition:transform .16s ease,box-shadow .16s ease}.deck-card:hover{transform:translateY(-3px);box-shadow:var(--shadow)}.deck-card h2,.info-card h2{margin:12px 0 8px;font-size:26px;letter-spacing:-.035em}.deck-card p,.info-card p{color:var(--muted);line-height:1.45;margin:0}.meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px}.pill,.stat{border:1px solid var(--line);background:rgba(255,255,255,.7);border-radius:999px;padding:8px 11px;color:var(--muted);font-size:13px;font-weight:750}.toolbar{position:sticky;top:0;z-index:5;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);background:rgba(245,247,248,.86);padding:14px 0;display:grid;gap:12px}.controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;align-items:center}.filter-toggle{display:none}input,select,button{font:inherit}input,select{border:1px solid var(--line);background:rgba(255,255,255,.9);border-radius:14px;padding:12px 14px;color:var(--text);outline:none;min-height:46px}input{min-width:min(380px,100%)}button{border:0;border-radius:14px;padding:12px 15px;min-height:46px;cursor:pointer;background:var(--text);color:white;font-weight:850}button.secondary{background:rgba(255,255,255,.9);color:var(--text);border:1px solid var(--line)}button.good{background:var(--brand)}.stats{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;color:var(--muted);font-size:14px;font-weight:700}.stage{margin-top:22px;display:grid;place-items:center;gap:20px}.progress{width:min(780px,100%);height:9px;background:rgba(16,42,51,.08);border-radius:999px;overflow:hidden}.bar{height:100%;width:0;background:linear-gradient(90deg,var(--brand),var(--brand2));transition:width .25s ease}.card-wrap{width:min(780px,100%);min-height:390px;perspective:1400px;-webkit-perspective:1400px}.card{position:relative;width:100%;min-height:390px;border-radius:var(--radius);cursor:pointer;box-shadow:var(--shadow);transform-style:preserve-3d;-webkit-transform-style:preserve-3d}.face{position:absolute;inset:0;border-radius:var(--radius);padding:clamp(26px,4vw,44px);display:flex;flex-direction:column;justify-content:space-between;overflow:hidden;transition:opacity .28s ease,transform .55s cubic-bezier(.2,.8,.2,1),visibility .28s ease;backface-visibility:hidden;-webkit-backface-visibility:hidden}.face:before{content:"";position:absolute;width:340px;height:340px;border-radius:50%;right:-145px;top:-150px;background:radial-gradient(circle,rgba(29,127,145,.18),transparent 64%);pointer-events:none}.front{background:linear-gradient(145deg,rgba(255,255,255,.96),rgba(255,255,255,.78));border:1px solid rgba(255,255,255,.75);opacity:1;visibility:visible;transform:rotateY(0deg) translateZ(1px)}.back{background:linear-gradient(145deg,#123642,#165667);color:white;border:1px solid rgba(255,255,255,.16);opacity:0;visibility:hidden;transform:rotateY(-180deg) translateZ(1px)}.card.flipped .front{opacity:0;visibility:hidden;transform:rotateY(180deg) translateZ(1px)}.card.flipped .back{opacity:1;visibility:visible;transform:rotateY(0deg) translateZ(1px)}.category{width:fit-content;padding:7px 11px;border-radius:999px;background:var(--soft);color:var(--brand);font-weight:850;font-size:13px}.back .category{background:rgba(255,255,255,.12);color:white}.question{font-size:clamp(28px,4.5vw,44px);line-height:1.12;letter-spacing:-.035em;font-weight:850;max-width:680px;position:relative;z-index:1}.answer{font-size:clamp(21px,3.1vw,34px);line-height:1.22;letter-spacing:-.025em;font-weight:780;max-width:700px;position:relative;z-index:1}.hint{margin-top:22px;color:var(--muted);font-size:14px;font-weight:700;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}.back .hint{color:rgba(255,255,255,.72)}.nav{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}.grid{margin-top:36px;display:grid;grid-template-columns:repeat(auto-fit,minmax(245px,1fr));gap:14px}.mini{padding:18px;border-radius:22px;border:1px solid var(--line);background:rgba(255,255,255,.68);cursor:pointer}.mini .tag{color:var(--brand);font-weight:850;font-size:12px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}.mini h3{margin:0;font-size:16px;line-height:1.25;letter-spacing:-.015em}.phrases{margin-top:34px;background:rgba(255,255,255,.68);border:1px solid var(--line);border-radius:var(--radius);padding:clamp(22px,4vw,34px)}.phrases h2{margin:0 0 16px;font-size:28px;letter-spacing:-.035em}.phrases li{margin:10px 0;font-weight:750;line-height:1.45}.empty{display:none;text-align:center;padding:40px;color:var(--muted)}.hidden{display:none!important}code{background:rgba(16,42,51,.08);padding:2px 6px;border-radius:7px}@media(max-width:700px){#studyView header{display:none}.container{width:calc(100% - 18px);margin-bottom:18px}.home{padding-top:9px}.toolbar{position:static;padding:8px 0 10px;gap:7px}.controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}.filter-toggle{display:inline-flex;align-items:center;justify-content:center}.controls button,.controls input,.controls select{font-size:14px;min-height:38px;padding:8px 9px;border-radius:12px}.controls #homeBtn{grid-column:1}.controls #filterToggle{grid-column:2}.controls #shuffle{grid-column:3}.controls #mastered{grid-column:1/4}.controls #search,.controls #category,.controls #reset{grid-column:1/4}.controls:not(.filters-open) #search,.controls:not(.filters-open) #category,.controls:not(.filters-open) #reset{display:none}.stats{gap:6px}.stat{font-size:12px;padding:6px 9px}.stats .stat:nth-child(3){display:none}.stage{margin-top:8px;gap:10px}.progress{height:6px}.card-wrap,.card{min-height:min(610px,calc(100svh - 238px));width:100%}.face{padding:24px 22px}.category{font-size:12px;padding:6px 10px}.question{font-size:clamp(26px,7vw,36px);line-height:1.12}.answer{font-size:clamp(21px,6.1vw,32px);line-height:1.18}.hint{font-size:13px}.nav{position:sticky;bottom:0;z-index:4;background:linear-gradient(180deg,rgba(245,247,248,0),rgba(245,247,248,.95) 30%);padding:18px 0 6px}.nav button{flex:1;min-width:0;font-size:15px;min-height:40px;padding:9px 8px}.grid,.phrases{display:none}.home-grid{grid-template-columns:1fr}.deck-card,.info-card{padding:22px;border-radius:24px}}
</style>
</head>
<body>
<section id="homeView"><main class="container home"><div class="home-grid" id="deckGrid"><article class="info-card"><span class="badge">Chargement</span><h2>Les cartes arrivent…</h2></article></div></main></section>
<section id="studyView" class="hidden"><header><div class="eyebrow" id="studyBadge">Flashcards</div><h1 id="studyTitle"></h1><p class="subtitle" id="studySubtitle"></p></header><main class="container"><section class="toolbar"><div class="controls" id="controls"><button class="secondary" id="homeBtn">← Accueil</button><button class="secondary filter-toggle" id="filterToggle">Filtres</button><button class="secondary" id="shuffle">Mélanger</button><button class="good" id="mastered">Je maîtrise</button><input id="search" type="search" placeholder="Rechercher une commande, une notion…"><select id="category"><option value="all">Toutes les catégories</option></select><button class="secondary" id="reset">Réinitialiser</button></div><div class="stats"><span class="stat" id="counter"></span><span class="stat" id="masteredCount"></span><span class="stat">Espace : retourner • ←/→ : naviguer</span></div></section><section class="stage"><div class="progress"><div class="bar" id="bar"></div></div><div class="card-wrap"><div class="card" id="card"><div class="face front"><div class="category" id="catFront"></div><div class="question" id="front"></div><div class="hint"><span>Cliquer pour voir la réponse</span><span id="idxFront"></span></div></div><div class="face back"><div class="category" id="catBack"></div><div class="answer" id="back"></div><div class="hint"><span>Cliquer pour revenir à la question</span><span id="idxBack"></span></div></div></div></div><div class="nav"><button class="secondary" id="prev">← Précédente</button><button class="secondary" id="flip">Retourner</button><button id="next">Suivante →</button></div><div class="empty" id="empty">Aucune carte ne correspond à ta recherche.</div></section><section class="phrases hidden" id="phrasesBox"><h2>À garder en tête</h2><ol id="phrasesList"></ol></section><section class="grid" id="grid"></section></main></section>
<script>
const A=(category,front,back)=>({category,front,back});
const FAMILIES=[{id:"business",label:"Business",desc:"Négociation, propositions, vente et stratégie commerciale."},{id:"technique",label:"Technique",desc:"Linux, Docker, SSH, OpenClaw, agents et infrastructure."},{id:"livre",label:"Livre",desc:"Jeux de cartes de lecture, concepts clés et mémorisation."}];
const DECKS=[
{id:"demant-kam",family:"business",badge:"Négociation",title:"Demant — Must-Win Accounts",subtitle:"Être solide face à Cédric sur la proposition d’accompagnement KAM.",description:"Arguments, objections, prix, ROI, closing et posture de négociation.",phrases:["Vous n’avez pas besoin d’une méthode supplémentaire, vous avez besoin d’un accélérateur d’exécution.","AIM donne le cadre ; la mission transforme ce cadre en actions concrètes sur les comptes prioritaires.","Si le budget doit être ajusté, on ajuste le périmètre, pas la qualité de la mission."],cards:[A("Positionnement","Quel est le cœur de la proposition ?","Transformer les Must-Win Accounts en plans de conquête activables, compte par compte, avec une vraie dynamique d’exécution terrain."),A("Positionnement","Ce n’est pas une formation ?","Non. Demant dispose déjà d’AIM. Mon rôle n’est pas d’ajouter une méthode, mais d’aider l’équipe à faire vivre AIM sur les comptes réels."),A("Valeur","Quelle est la valeur ajoutée par rapport à AIM ?","AIM donne le cadre. L’accompagnement transforme ce cadre en plans d’action : qui contacter, dans quel ordre, avec quel message, quels relais activer, quelles contreparties préparer."),A("Objections","Pourquoi ne pas le faire seuls ?","Vous pouvez en faire une partie seuls. La question est : aurez-vous le temps, le recul et la discipline pour le faire vite, sans retomber dans le quotidien ?"),A("Prix","C’est cher pour quelques ateliers.","Ce ne sont pas quelques ateliers. Le forfait couvre préparation, analyse des documents, animation, suivi, livrables, playbook et transfert méthodologique."),A("Closing","Phrase de closing douce","À mon sens, l’option Impact 90 jours est le bon équilibre : suffisamment structurante pour produire un vrai résultat, sans embarquer l’organisation dans un dispositif trop lourd.")]},
{id:"linux-ssh-docker",family:"technique",badge:"Tech",title:"Linux, SSH & Docker",subtitle:"Être à l’aise sur le serveur familial : terminal, VS Code, Docker, fichiers, logs et sécurité.",description:"Commandes utiles, réflexes de sécurité, Docker, volumes, permissions, VS Code Remote et diagnostic.",phrases:["Toujours savoir où je suis : pwd, hostname, whoami.","Observer avant d’agir : ls, docker ps, logs, git status.","sudo donne du pouvoir : je lis, je comprends, puis j’exécute."],cards:[A("Connexion","Qu’est-ce que je fais quand je me connecte en SSH ?","Tu ouvres une session terminal sur le serveur distant. Les commandes que tu tapes s’exécutent sur le serveur Linux, pas sur ton Mac."),A("Connexion","Comment savoir si je suis bien sur le serveur ?","Tape hostname, whoami et pwd. hostname indique la machine, whoami l’utilisateur connecté, pwd le dossier courant."),A("Navigation","Quelle est la commande la plus importante avant de toucher aux fichiers ?","pwd. Elle répond à la question : dans quel dossier suis-je exactement ?"),A("Fichiers","Comment créer un dossier proprement ?","mkdir nom_du_dossier. Avec plusieurs niveaux : mkdir -p clients/prodition/logs."),A("Permissions","À quoi sert sudo ?","sudo exécute une commande avec des privilèges administrateur. C’est puissant, donc à utiliser seulement quand tu comprends l’action."),A("Docker","Quelle commande liste les conteneurs actifs ?","docker ps. Pour voir aussi les conteneurs arrêtés : docker ps -a."),A("Docker","Comment entrer dans un conteneur ?","docker exec -it nom_du_conteneur bash. Si bash n’existe pas : docker exec -it nom_du_conteneur sh."),A("Docker","Qu’est-ce qu’un volume Docker ?","Un espace de stockage persistant attaché au conteneur. Même si le conteneur est recréé, les données du volume peuvent rester."),A("Sécurité","Quelles commandes éviter sans validation ?","docker system prune, docker volume rm, docker rm, rm -rf, chmod -R 777, chown -R sur un dossier critique."),A("Méthode","Quelle phrase mentale garder avant chaque commande ?","Je sais où je suis, je sais ce que je vise, je sais comment revenir en arrière.")]},
{id:"openclaw-fondamentaux",family:"technique",badge:"OpenClaw",title:"OpenClaw — Fondamentaux",subtitle:"Maîtriser le Gateway, les agents, les outils, les skills, la config, les canaux et la sécurité.",description:"Les notions clés pour comprendre, administrer et sécuriser OpenClaw.",phrases:["Le Gateway route, l’agent raisonne, les outils agissent.","Un skill enseigne une méthode ; un outil agit ; un plugin ajoute une capacité.","Quand ça casse : status, health, doctor, logs, puis petite correction."],cards:[A("Vision","OpenClaw, c’est quoi en une phrase ?","Un Gateway auto-hébergé qui relie des messageries, une interface web et des agents IA capables d’utiliser des outils, des sessions, de la mémoire et du routage multi-agent."),A("Architecture","Quel est le rôle du Gateway ?","Le Gateway est le centre de contrôle : il reçoit les messages, gère les sessions, applique la configuration, route vers le bon agent et expose le dashboard."),A("Configuration","Où se trouve le fichier de configuration principal ?","Par défaut : ~/.openclaw/openclaw.json. C’est le fichier à connaître avant toute modification sérieuse."),A("Canaux","Qu’est-ce qu’un channel ?","Un canal de communication : Telegram, WhatsApp, Slack, Discord, Signal, iMessage, Matrix, Google Chat, Teams, etc."),A("Agents","Qu’est-ce qu’un agent dans OpenClaw ?","Un cerveau isolé : workspace, personnalité, fichiers, profils d’authentification, modèle, mémoire et historique de sessions."),A("Capacités","Différence entre outil, skill et plugin ?","Un outil permet d’agir. Un skill donne des instructions réutilisables. Un plugin ajoute de nouvelles capacités runtime : outils, canaux, providers, hooks ou skills packagés."),A("Sécurité","Pourquoi un agent partagé est dangereux ?","Toute personne autorisée peut potentiellement orienter les outils disponibles : fichiers, navigateur, exec, réseau, secrets ou comptes connectés."),A("Méthode","Phrase mentale à retenir ?","Le Gateway route, l’agent raisonne, les outils agissent, la config limite, les logs expliquent.")]},
{id:"hayek-presomption-fatale",family:"livre",badge:"Livre",title:"La présomption fatale — Friedrich Hayek",subtitle:"Comprendre les idées clés du livre : ordre spontané, savoir dispersé, marché, règles et critique du constructivisme.",description:"Concepts clés de Hayek pour mémoriser l’argument central du livre.",phrases:["La société n’est pas seulement fabriquée : elle émerge aussi de règles, d’essais et de traditions.","Le savoir utile est dispersé : aucun centre ne peut tout connaître.","Le prix n’est pas qu’un chiffre : c’est un signal d’information.","La présomption fatale, c’est croire qu’on peut reconstruire rationnellement un ordre complexe.","Hayek défend l’humilité devant les systèmes sociaux complexes."],cards:[A("Thèse","Quelle est l’idée centrale de La présomption fatale ?","Hayek critique l’idée qu’une société complexe puisse être entièrement conçue et pilotée par la raison centrale. Il défend l’ordre spontané, né de règles, d’essais et de connaissances dispersées."),A("Concept","Qu’est-ce que la présomption fatale ?","C’est l’arrogance intellectuelle qui consiste à croire qu’un esprit, un comité ou un État peut comprendre assez le réel pour organiser rationnellement toute la société."),A("Ordre spontané","Qu’est-ce qu’un ordre spontané ?","Un ordre qui émerge des actions de nombreux individus sans avoir été dessiné par un plan central. Le marché, le langage ou certaines traditions en sont des exemples."),A("Savoir","Pourquoi le savoir dispersé est-il central chez Hayek ?","Parce que les informations utiles sont locales, changeantes et réparties entre des millions d’acteurs. Aucun planificateur ne peut les réunir efficacement en temps réel."),A("Prix","Quel rôle jouent les prix ?","Les prix condensent de l’information : rareté, demande, préférence, opportunité. Ils permettent aux individus de coordonner leurs décisions sans tout connaître."),A("Marché","Pourquoi le marché est-il plus qu’un mécanisme économique ?","Chez Hayek, le marché est un système de coordination sociale fondé sur des signaux, des règles et des ajustements permanents entre acteurs."),A("Tradition","Pourquoi Hayek défend-il certaines traditions ?","Non parce qu’elles seraient sacrées, mais parce qu’elles peuvent contenir une sagesse accumulée que personne n’a conçue consciemment."),A("Règles","Pourquoi les règles abstraites sont-elles importantes ?","Elles permettent à des inconnus de coopérer sans se connaître. Propriété, contrat, responsabilité et liberté créent un cadre prévisible."),A("Critique","Quelle est sa critique du socialisme ?","Il reproche au socialisme de sous-estimer la complexité sociale, le rôle des prix et l’impossibilité pratique de centraliser toute l’information nécessaire."),A("Morale","Pourquoi Hayek parle-t-il de morale évolutive ?","Parce que certaines règles morales auraient survécu non par raisonnement pur, mais parce qu’elles facilitaient la coopération et l’extension de l’ordre social."),A("Capitalisme","Quelle défense du capitalisme propose Hayek ?","Il ne le défend pas comme un système parfait, mais comme un ordre de coordination plus capable d’utiliser le savoir dispersé que la planification centrale."),A("Erreur","Quelle erreur faut-il éviter en lisant Hayek ?","Croire qu’il dit que tout ordre existant est bon. Son point est plutôt : attention à ne pas détruire des mécanismes complexes que l’on comprend mal."),A("Humilité","Quelle vertu intellectuelle Hayek demande-t-il ?","L’humilité. Face aux systèmes sociaux complexes, il faut se méfier des solutions trop simples et des plans qui prétendent tout maîtriser."),A("Application","Comment appliquer cette idée en entreprise ?","Avant de réorganiser brutalement un système, observer les flux réels, les habitudes, les signaux terrain et les règles implicites qui font déjà fonctionner l’ensemble."),A("Phrase clé","Phrase à retenir sur Hayek","La liberté n’est pas seulement une valeur morale : c’est aussi une condition pour utiliser une connaissance que personne ne possède en totalité.")]}
];
let view="families",currentFamily=null,deck=null,filtered=[],index=0,flipped=false,mastered=new Set();
const el=id=>document.getElementById(id),card=el("card"),search=el("search"),category=el("category"),controls=el("controls");
function key(){return "mastered:"+deck.id}function save(){localStorage.setItem(key(),JSON.stringify([...mastered]))}function load(){try{mastered=new Set(JSON.parse(localStorage.getItem(key())||"[]"))}catch{mastered=new Set()}}function cardId(c){return c.category+"|"+c.front}
function showHome(){deck=null;currentFamily=null;view="families";location.hash="";el("homeView").classList.remove("hidden");el("studyView").classList.add("hidden");renderHome()}
function renderHome(){if(view==="families"){el("deckGrid").innerHTML=FAMILIES.map(f=>`<article class="deck-card" onclick="openFamily('${f.id}')"><span class="badge">Famille</span><h2>${f.label}</h2><p>${f.desc}</p><div class="meta"><span class="pill">${DECKS.filter(d=>d.family===f.id).length} jeux</span></div></article>`).join("");return}const decks=DECKS.filter(d=>d.family===currentFamily);el("deckGrid").innerHTML=`<article class="deck-card" onclick="showHome()"><span class="badge">Retour</span><h2>← Familles</h2><p>Revenir aux grandes familles de cartes.</p></article>`+decks.map(d=>`<article class="deck-card" onclick="openDeck('${d.id}')"><span class="badge">${d.badge}</span><h2>${d.title}</h2><p>${d.description}</p><div class="meta"><span class="pill">${d.cards.length} cartes</span><span class="pill">${[...new Set(d.cards.map(c=>c.category))].length} catégories</span></div></article>`).join("")}
window.openFamily=function(id){currentFamily=id;view="decks";location.hash="family="+id;renderHome()};
window.openDeck=function(id){deck=DECKS.find(d=>d.id===id);if(!deck)return;location.hash="deck="+id;load();filtered=[...deck.cards];index=0;search.value="";controls.classList.remove("filters-open");category.innerHTML="<option value='all'>Toutes les catégories</option>";[...new Set(deck.cards.map(c=>c.category))].sort((a,b)=>a.localeCompare(b,"fr")).forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=c;category.appendChild(o)});el("studyBadge").textContent=deck.badge;el("studyTitle").textContent=deck.title;el("studySubtitle").textContent=deck.subtitle;el("homeView").classList.add("hidden");el("studyView").classList.remove("hidden");renderPhrases();render();scrollTo({top:0,behavior:"smooth"})};
function renderPhrases(){const box=el("phrasesBox"),list=el("phrasesList");if(deck.phrases&&deck.phrases.length){box.classList.remove("hidden");list.innerHTML=deck.phrases.map(p=>`<li>${p}</li>`).join("")}else box.classList.add("hidden")}
function render(){if(!filtered.length){el("empty").style.display="block";card.style.visibility="hidden";el("counter").textContent="0 carte";el("bar").style.width="0%";renderGrid();return}el("empty").style.display="none";card.style.visibility="visible";index=Math.max(0,Math.min(index,filtered.length-1));const c=filtered[index];el("catFront").textContent=c.category;el("catBack").textContent=c.category;el("front").textContent=c.front;el("back").textContent=c.back;el("idxFront").textContent=`${index+1} / ${filtered.length}`;el("idxBack").textContent=`${index+1} / ${filtered.length}`;el("counter").textContent=`Carte ${index+1} / ${filtered.length}`;el("masteredCount").textContent=`${mastered.size} maîtrisée${mastered.size>1?"s":""}`;el("bar").style.width=`${((index+1)/filtered.length)*100}%`;flipped=false;card.classList.remove("flipped");el("mastered").textContent=mastered.has(cardId(c))?"Maîtrisée ✓":"Je maîtrise";renderGrid()}
function renderGrid(){const grid=el("grid");grid.innerHTML="";filtered.forEach((c,i)=>{const item=document.createElement("article");item.className="mini";item.dataset.answer=" — "+c.back;item.innerHTML=`<div class="tag">${c.category}</div><h3>${i+1}. ${c.front}</h3>`;item.onclick=()=>{index=i;scrollTo({top:0,behavior:"smooth"});render()};grid.appendChild(item)})}
function applyFilters(){const q=search.value.trim().toLowerCase(),cat=category.value;filtered=deck.cards.filter(c=>(cat==="all"||c.category===cat)&&(!q||(c.front+" "+c.back+" "+c.category).toLowerCase().includes(q)));index=0;render()}function next(){if(filtered.length){index=(index+1)%filtered.length;render()}}function prev(){if(filtered.length){index=(index-1+filtered.length)%filtered.length;render()}}function flip(){if(filtered.length){flipped=!flipped;card.classList.toggle("flipped",flipped)}}function shuffle(){for(let i=filtered.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[filtered[i],filtered[j]]=[filtered[j],filtered[i]]}index=0;render()}
card.onclick=flip;el("flip").onclick=flip;el("next").onclick=next;el("prev").onclick=prev;el("shuffle").onclick=shuffle;el("homeBtn").onclick=showHome;el("filterToggle").onclick=()=>controls.classList.toggle("filters-open");el("reset").onclick=()=>{search.value="";category.value="all";filtered=[...deck.cards];index=0;mastered.clear();save();render()};el("mastered").onclick=()=>{if(!filtered.length)return;const id=cardId(filtered[index]);mastered.has(id)?mastered.delete(id):mastered.add(id);save();render()};search.oninput=applyFilters;category.onchange=applyFilters;document.addEventListener("keydown",e=>{if(["INPUT","SELECT","TEXTAREA"].includes(document.activeElement.tagName))return;if(!deck)return;if(e.key===" "){e.preventDefault();flip()}if(e.key==="ArrowRight")next();if(e.key==="ArrowLeft")prev();if(e.key==="Escape")showHome()});
function boot(){const m=location.hash.match(/deck=([^&]+)/);const f=location.hash.match(/family=([^&]+)/);if(m){openDeck(decodeURIComponent(m[1]));return}if(f){openFamily(decodeURIComponent(f[1]));return}renderHome()}boot();
</script>
